<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Reader</title>
<link rel="stylesheet" href="libs/github.min.css">
<style>
  /* === 全局 === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #ffffff;
    --color-text: #1f2328;
    --color-text-secondary: #656d76;
    --color-border: #d0d7de;
    --color-sidebar-bg: #f6f8fa;
    --color-code-bg: #f6f8fa;
    --color-accent: #0969da;
    --max-content-width: 900px;
    --sidebar-width: 260px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
      Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--color-text);
    background: var(--color-bg);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* === 侧边栏 === */
  #sidebar {
    width: var(--sidebar-width);
    min-width: 200px;
    max-width: 400px;
    background: var(--color-sidebar-bg);
    border-right: 1px solid var(--color-border);
    display: none;
    flex-direction: column;
    overflow: hidden;
    resize: horizontal;
  }

  #sidebar.visible { display: flex; }

  #sidebar-header {
    padding: 12px 16px;
    font-weight: 600;
    font-size: 14px;
    color: var(--color-text-secondary);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #sidebar-header button {
    background: none;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 14px;
    color: var(--color-text-secondary);
  }

  #sidebar-header button:hover { background: #eaeef2; }

  #file-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  #file-list li {
    padding: 6px 16px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #file-list li:hover { background: #eaeef2; }
  #file-list li.active {
    background: #ddf4ff;
    color: var(--color-accent);
    font-weight: 500;
  }

  /* === 主内容区 === */
  #main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* === 拖拽区域 === */
  #drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--color-text-secondary);
    border: 2px dashed var(--color-border);
    border-radius: 12px;
    margin: 40px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    min-height: 300px;
  }

  #drop-zone.drag-over {
    border-color: var(--color-accent);
    background: #ddf4ff;
  }

  #drop-zone .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  #drop-zone .title { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
  #drop-zone .subtitle { font-size: 14px; }

  /* === 内容容器 === */
  #content {
    max-width: var(--max-content-width);
    margin: 0 auto;
    padding: 32px 48px;
    width: 100%;
    display: none;
  }

  #content.visible { display: block; }

  /* === Markdown 内容样式（参考 GitHub） === */
  .markdown-body { font-size: 16px; }

  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
    position: relative;
  }

  .markdown-body h1 {
    font-size: 2em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--color-border);
  }
  .markdown-body h2 {
    font-size: 1.5em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--color-border);
  }
  .markdown-body h3 { font-size: 1.25em; }
  .markdown-body h4 { font-size: 1em; }

  .markdown-body p { margin-bottom: 16px; }

  .markdown-body a { color: var(--color-accent); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }

  .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 2em; }
  .markdown-body li { margin-bottom: 4px; }

  .markdown-body blockquote {
    padding: 0 1em;
    color: var(--color-text-secondary);
    border-left: 0.25em solid var(--color-border);
    margin-bottom: 16px;
  }

  .markdown-body table {
    border-collapse: collapse;
    margin-bottom: 16px;
    width: 100%;
  }
  .markdown-body th, .markdown-body td {
    padding: 6px 13px;
    border: 1px solid var(--color-border);
  }
  .markdown-body th { font-weight: 600; background: var(--color-sidebar-bg); }

  .markdown-body hr {
    border: 0;
    height: 0.25em;
    background: var(--color-border);
    margin: 24px 0;
  }

  /* 代码块（未高亮时的基础样式） */
  .markdown-body code {
    background: var(--color-code-bg);
    border-radius: 6px;
    padding: 0.2em 0.4em;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
      "Liberation Mono", monospace;
    font-size: 85%;
  }

  .markdown-body pre {
    background: var(--color-code-bg);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 16px;
    position: relative;
  }

  .markdown-body pre code {
    background: none;
    padding: 0;
    font-size: 85%;
    line-height: 1.45;
  }

  /* === 复制按钮 === */
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 12px;
    font-size: 12px;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--color-text-secondary);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .markdown-body pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: #eaeef2; }
  .copy-btn.copied { color: #1a7f37; border-color: #1a7f37; }

  /* === 标题锚点 === */
  .anchor-link {
    position: absolute;
    left: -24px;
    top: 0;
    opacity: 0;
    color: var(--color-text-secondary);
    text-decoration: none;
    font-size: 0.85em;
    padding: 0 4px;
    transition: opacity 0.15s;
  }

  .markdown-body h1:hover .anchor-link,
  .markdown-body h2:hover .anchor-link,
  .markdown-body h3:hover .anchor-link,
  .markdown-body h4:hover .anchor-link,
  .markdown-body h5:hover .anchor-link,
  .markdown-body h6:hover .anchor-link { opacity: 1; }

  /* === 响应式 === */
  @media (max-width: 768px) {
    #content { padding: 16px 24px; }
  }
</style>
</head>
<body>

<!-- 侧边栏 -->
<nav id="sidebar">
  <div id="sidebar-header">
    <span id="sidebar-title">文件列表</span>
    <button id="sidebar-toggle" title="收起侧边栏">&lt;</button>
  </div>
  <ul id="file-list"></ul>
</nav>

<!-- 主内容区 -->
<main id="main">
  <!-- 拖拽区域 -->
  <div id="drop-zone">
    <div class="icon">📄</div>
    <div class="title">打开 Markdown 文件</div>
    <div class="subtitle">拖拽 .md 文件到此处，或点击选择文件</div>
  </div>

  <!-- 内容容器 -->
  <div id="content" class="markdown-body"></div>
</main>

<script src="libs/marked.min.js"></script>
<script src="libs/highlight.min.js"></script>
<script>
// === Markdown 渲染配置 ===
marked.setOptions({
  gfm: true,
  breaks: false,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try {
        return hljs.highlight(code, { language: lang }).value;
      } catch (_) {}
    }
    try {
      return hljs.highlightAuto(code).value;
    } catch (_) {}
    return code;
  }
});

// === 状态 ===
let currentFilePath = null;
let currentFolderPath = null;
let fileListData = [];
let dragActive = false;

// === 渲染 Markdown ===
function renderMarkdown(markdownText) {
  const html = marked.parse(markdownText);
  contentEl.innerHTML = html;

  // 给标题加锚点
  const usedIds = new Set();
  contentEl.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(heading => {
    if (!heading.id) {
      let baseId = generateId(heading.textContent);
      let id = baseId;
      let counter = 1;
      while (usedIds.has(id)) {
        id = baseId + '-' + (++counter);
      }
      heading.id = id;
    }
    usedIds.add(heading.id);
    const anchor = document.createElement('a');
    anchor.className = 'anchor-link';
    anchor.href = '#' + heading.id;
    anchor.textContent = '#';
    heading.appendChild(anchor);
  });

  // 给代码块加复制按钮
  contentEl.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    btn.addEventListener('click', function() {
      const code = pre.querySelector('code') || pre;
      navigator.clipboard.writeText(code.textContent).then(() => {
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // fallback: 使用 execCommand
        const textarea = document.createElement('textarea');
        textarea.value = code.textContent;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
    pre.appendChild(btn);
  });
}

function generateId(text) {
  const id = text.toLowerCase().trim()
    .replace(/[^\w一-鿿\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
  return id || 'section';
}

// === DOM 引用 ===
const dropZone = document.getElementById('drop-zone');
const contentEl = document.getElementById('content');
const sidebar = document.getElementById('sidebar');
const fileList = document.getElementById('file-list');
const sidebarTitle = document.getElementById('sidebar-title');
const sidebarToggle = document.getElementById('sidebar-toggle');

// === 显示/隐藏拖拽区 ===
function showDropZone(show) {
  dropZone.style.display = show ? 'flex' : 'none';
  if (show) {
    contentEl.classList.remove('visible');
    contentEl.innerHTML = '';
  }
}

function showContent(show) {
  if (show) {
    contentEl.classList.add('visible');
  } else {
    contentEl.classList.remove('visible');
    contentEl.innerHTML = '';
  }
}

// === 侧边栏 ===
sidebarToggle.addEventListener('click', () => {
  sidebar.classList.remove('visible');
});

function showSidebar(files, folderPath) {
  currentFolderPath = folderPath;
  fileListData = files;
  sidebarTitle.textContent = folderPath.split(/[/\\]/).pop() || '文件列表';
  sidebar.classList.add('visible');
  fileList.innerHTML = '';
  files.forEach((file, index) => {
    const li = document.createElement('li');
    li.textContent = file.name;
    li.title = file.path;
    li.addEventListener('click', () => openFileFromList(index));
    fileList.appendChild(li);
  });
}

function openFileFromList(index) {
  const file = fileListData[index];
  if (!file) return;
  // 调用 Python 后端读取文件
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.read_file(file.path).then(content => {
      currentFilePath = file.path;
      showDropZone(false);
      showContent(true);
      renderMarkdown(content);
      // 高亮当前项
      document.querySelectorAll('#file-list li').forEach((li, i) => {
        li.classList.toggle('active', i === index);
      });
    }).catch(err => {
      alert('读取文件失败: ' + err);
    });
  }
}

// === 拖拽处理 ===
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.stopPropagation();
  dragActive = true;
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!e.relatedTarget || !dropZone.contains(e.relatedTarget)) {
    dragActive = false;
    dropZone.classList.remove('drag-over');
  }
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  e.stopPropagation();
  dragActive = false;
  dropZone.classList.remove('drag-over');

  const files = e.dataTransfer.files;
  if (files.length === 0) return;

  const file = files[0];
  if (!file.name.toLowerCase().endsWith('.md')) {
    alert('仅支持 .md 文件');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(ev) {
    currentFilePath = file.name;
    showDropZone(false);
    showContent(true);
    renderMarkdown(ev.target.result);
    sidebar.classList.remove('visible');
  };
  reader.onerror = function() {
    alert('读取文件失败，请检查文件是否可访问');
  };
  reader.readAsText(file, 'UTF-8');
});

// === 点击拖拽区 → 通过 Python 打开文件对话框 ===
dropZone.addEventListener('click', () => {
  if (dragActive) {
    dragActive = false;
    return;
  }
  if (window.pywebview && window.pywebview.api) {
    window.pywebview.api.open_file_dialog().then(result => {
      if (!result) return; // 用户取消
      const data = JSON.parse(result);
      if (!data.ok) return;
      currentFilePath = data.path;
      showDropZone(false);
      showContent(true);
      renderMarkdown(data.content);
      sidebar.classList.remove('visible');
    }).catch(err => {
      console.error('打开文件失败:', err);
    });
  }
});

// === 暴露给 Python 调用的函数 ===
function loadFileContent(filePath, content) {
  currentFilePath = filePath;
  showDropZone(false);
  showContent(true);
  renderMarkdown(content);
}

function loadFolder(fileList, folderPath) {
  showDropZone(false);
  showSidebar(fileList, folderPath);
  if (fileList.length > 0) {
    openFileFromList(0);
  } else {
    showContent(true);
    contentEl.innerHTML = '<p style="text-align:center;color:#656d76;padding:48px;">该文件夹中没有 .md 文件</p>';
  }
}

function showWelcome() {
  showDropZone(true);
  currentFilePath = null;
  sidebar.classList.remove('visible');
}
</script>
</body>
</html>
